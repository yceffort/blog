<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Transition Demo 3: Directional Navigation Slide</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid #222;
  }
  h1 {
    font-size: 14px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  nav {
    display: flex;
    gap: 8px;
  }
  nav button {
    padding: 8px 16px;
    font-size: 13px;
    background: #2a2a4a;
    color: #e0e0e0;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  nav button:hover { background: #3a3a5a; }
  nav button.active { background: #2563eb; }

  .page-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    view-transition-name: page-content;
  }
  .page {
    text-align: center;
    padding: 40px;
  }
  .page .icon {
    font-size: 64px;
    margin-bottom: 20px;
  }
  .page h2 {
    font-size: 28px;
    margin-bottom: 12px;
  }
  .page p {
    color: #888;
    max-width: 400px;
    line-height: 1.6;
  }

  /* direction이 설정되지 않은 경우 기본 */
  ::view-transition-old(page-content),
  ::view-transition-new(page-content) {
    animation-duration: 400ms;
    animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
  }
</style>
</head>
<body>
  <header>
    <h1>Demo 3 &mdash; Nav Slide</h1>
    <nav id="nav"></nav>
  </header>
  <div class="page-container" id="content"></div>

  <script>
    const pages = [
      { id: 'home', label: 'Home', icon: '🏠', title: 'Home', desc: 'Welcome to the home page. Navigate to other pages to see the slide transition.' },
      { id: 'explore', label: 'Explore', icon: '🔍', title: 'Explore', desc: 'Discover new content and explore what\'s trending.' },
      { id: 'library', label: 'Library', icon: '📚', title: 'Library', desc: 'Your saved content and bookmarks, all in one place.' },
      { id: 'profile', label: 'Profile', icon: '👤', title: 'Profile', desc: 'Manage your profile settings and preferences.' },
    ];

    let currentIndex = 0;
    const nav = document.getElementById('nav');
    const content = document.getElementById('content');

    function renderNav() {
      nav.innerHTML = pages.map((p, i) =>
        `<button data-index="${i}" class="${i === currentIndex ? 'active' : ''}">${p.label}</button>`
      ).join('');
      nav.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => navigate(Number(btn.dataset.index)));
      });
    }

    function renderPage() {
      const p = pages[currentIndex];
      content.innerHTML = `<div class="page"><div class="icon">${p.icon}</div><h2>${p.title}</h2><p>${p.desc}</p></div>`;
    }

    function navigate(toIndex) {
      if (toIndex === currentIndex) return;
      const direction = toIndex > currentIndex ? 'forward' : 'back';
      currentIndex = toIndex;

      if (!document.startViewTransition) {
        renderPage();
        renderNav();
        return;
      }

      // Set CSS class dynamically based on direction
      const style = document.createElement('style');
      if (direction === 'forward') {
        style.textContent = `
          ::view-transition-old(page-content) {
            animation: 150ms cubic-bezier(0.4,0,1,1) both fade-out,
                       400ms cubic-bezier(0.4,0,0.2,1) both slide-to-left;
          }
          ::view-transition-new(page-content) {
            animation: 210ms cubic-bezier(0,0,0.2,1) 150ms both fade-in,
                       400ms cubic-bezier(0.4,0,0.2,1) both slide-from-right;
          }`;
      } else {
        style.textContent = `
          ::view-transition-old(page-content) {
            animation: 150ms cubic-bezier(0.4,0,1,1) both fade-out,
                       400ms cubic-bezier(0.4,0,0.2,1) both slide-to-right;
          }
          ::view-transition-new(page-content) {
            animation: 210ms cubic-bezier(0,0,0.2,1) 150ms both fade-in,
                       400ms cubic-bezier(0.4,0,0.2,1) both slide-from-left;
          }`;
      }
      document.head.appendChild(style);

      const t = document.startViewTransition(() => {
        renderPage();
        renderNav();
      });
      t.finished.then(() => style.remove());
    }

    // Keyframes
    const keyframes = document.createElement('style');
    keyframes.textContent = `
      @keyframes fade-in { from { opacity: 0; } }
      @keyframes fade-out { to { opacity: 0; } }
      @keyframes slide-to-left { to { transform: translateX(-80px); } }
      @keyframes slide-from-right { from { transform: translateX(80px); } }
      @keyframes slide-to-right { to { transform: translateX(80px); } }
      @keyframes slide-from-left { from { transform: translateX(-80px); } }
    `;
    document.head.appendChild(keyframes);

    renderNav();
    renderPage();
  </script>
</body>
</html>
